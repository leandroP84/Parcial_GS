services:
  postgres:
    image: postgres:15-alpine
    container_name: smartcv-postgres
    environment:
      POSTGRES_DB: smartcv
      POSTGRES_USER: smartcv
      POSTGRES_PASSWORD: smartcv123
    # Sin ports: el backend se conecta por red interna (postgres:5432).
    # Evita conflicto con PostgreSQL/pgAdmin en tu PC (puertos 5432, 5433...).
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartcv -d smartcv"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: smartcv-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/smartcv
      DB_USERNAME: smartcv
      DB_PASSWORD: smartcv123
      JWT_SECRET: ${JWT_SECRET:-SmFydFNlY3JldEtleUZvclNtYXJ0Q1ZJQVBwbGljYXRpb24yMDI2RGV2}
      JWT_EXPIRATION: 86400000
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000,http://localhost
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: gemini-2.5-flash
      SEED_DATA: "true"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    container_name: smartcv-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:

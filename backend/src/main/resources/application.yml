spring:
  application:
    name: smartcv-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/smartcv}
    username: ${DB_USERNAME:smartcv}
    password: ${DB_PASSWORD:smartcv123}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:SmFydFNlY3JldEtleUZvclNtYXJ0Q1ZJQVBwbGljYXRpb24yMDI2RGV2}
  expiration: ${JWT_EXPIRATION:86400000}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost}

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}

# Cargar usuarios y CV de demostración al iniciar (desactivar en producción)
app:
  seed-data: ${SEED_DATA:true}

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: when_authorized
